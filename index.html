<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BJTT — Blue Jays Ticket Tracker | 2026 Season Ticket Tracker">
  <title>BJTT — Blue Jays Ticket Tracker</title>
  <link rel="stylesheet" href="src/css/styles.css">
</head>
<body>
  <header class="app-header">
    <nav class="nav-bar">
      <div class="nav-brand">
        <span class="nav-logo" aria-hidden="true">&#9918;</span>
        <span class="nav-title">BJTT</span>
      </div>
      <ul class="nav-tabs" role="tablist">
        <li>
          <button class="nav-tab active" role="tab" aria-selected="true" data-tab="schedule">
            <svg class="nav-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span>Schedule</span>
          </button>
        </li>
        <li>
          <button class="nav-tab" role="tab" aria-selected="false" data-tab="my-tickets">
            <svg class="nav-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 9a3 3 0 0 1 3-3h14a3 3 0 0 1 3 3v0a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3z"/>

            </svg>
            <span>My Tickets</span>
          </button>
        </li>
        <li>
          <button class="nav-tab" role="tab" aria-selected="false" data-tab="financials">
            <svg class="nav-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="1" x2="12" y2="23"/>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
            <span>Financials</span>
          </button>
        </li>
        <li>
          <button class="nav-tab" role="tab" aria-selected="false" data-tab="settings">
            <svg class="nav-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>

            <span>Settings</span>
          </button>
        </li>
      </ul>
      <a class="nav-utility-link" href="https://www.mlb.com/bluejays/ballpark/seating-map" target="_blank" rel="noopener noreferrer" title="Rogers Centre seating map">
        <svg class="nav-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/>
          <line x1="8" y1="2" x2="8" y2="18"/>
          <line x1="16" y1="6" x2="16" y2="22"/>
        </svg>
        <span>Map</span>
      </a>
    </nav>
  </header>

  <main>
    <div id="app"></div>
  </main>

  <footer class="app-footer">
    <p>BJTT &mdash; Blue Jays Ticket Tracker</p>
  </footer>

  <script>
    window.APP_CONFIG = {
      seasonDataUrl: 'config/2026_season.json',
      sectionsUrl: 'config/rogers_centre_sections.json',
      platformsUrl: 'config/platforms.json',
      packagesUrl: 'config/ticket_packages.json'
    };
  </script>
  <script type="module" src="src/js/app.js"></script>
</body>
</html>
